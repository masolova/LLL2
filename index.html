<!DOCTYPE html><html lang='ru'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>LLL2</title><link rel='icon' type='image/svg+xml' href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237a3340'/%3E%3Cpath d='M8 16h16' stroke='white' stroke-width='4'/%3E%3C/svg%3E"><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap' rel='stylesheet'><style>:root{--bg:#f7f3ee;--paper:#fffdfa;--line:rgba(93,55,65,.14);--text:#3f2a31;--muted:#816c73;--brand:#7a3340;--brand-dark:#5f2530;--soft-neutral:#f4f0eb;--shadow:0 20px 50px rgba(82,46,56,.08);--radius-xl:26px}*{box-sizing:border-box}html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#fdf8f4 0%,var(--bg) 55%,#f1eae3 100%);color:var(--text)}button{font:inherit}.shell{width:min(1360px,calc(100vw - 56px));margin:28px auto;background:rgba(255,255,255,.55);border:1px solid rgba(120,74,84,.12);border-radius:30px;box-shadow:var(--shadow);backdrop-filter:blur(14px);overflow:hidden}.topbar{height:76px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;background:rgba(255,255,255,.72);border-bottom:1px solid var(--line)}.topbar-left,.topbar-right{display:flex;align-items:center;gap:12px}.icon-btn{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:var(--paper);display:inline-flex;align-items:center;justify-content:center;color:var(--brand-dark);box-shadow:0 6px 20px rgba(82,46,56,.06);cursor:pointer}.brand-chip{height:44px;padding:0 18px;display:inline-flex;align-items:center;border-radius:999px;background:linear-gradient(180deg,#fffdfb 0%,#f8f0ec 100%);border:1px solid var(--line);font-size:14px;font-weight:650;letter-spacing:.02em;color:var(--brand-dark)}.page{padding:30px 34px 38px}.stage{background:linear-gradient(180deg,rgba(255,255,255,.88) 0%,rgba(255,251,247,.88) 100%);border:1px solid rgba(120,74,84,.10);border-radius:28px;padding:28px 28px 26px;min-height:760px}.labels{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:22px}.label{font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(90,58,68,.55);padding-left:4px}.columns{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:stretch}.panel{min-height:380px;border-radius:var(--radius-xl);background:var(--paper);border:1px solid rgba(120,74,84,.12);box-shadow:0 10px 30px rgba(82,46,56,.05);padding:34px 32px;display:flex;flex-direction:column;justify-content:space-between}.phrase,.translation{font-size:clamp(32px,3.3vw,54px);line-height:1.08;letter-spacing:-.04em;font-weight:800;max-width:12ch}.translation{color:var(--brand-dark);min-height:164px;display:flex;align-items:flex-start}.audio-wrap{margin-top:22px;display:flex}.audio-btn{height:54px;padding:0 22px;border-radius:999px;border:1px solid rgba(120,74,84,.14);background:#fff6f2;color:var(--brand-dark);display:inline-flex;align-items:center;gap:12px;font-weight:700;cursor:pointer}.audio-icon{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;padding-left:2px}.translate-row{margin-top:22px;display:flex}.translate-btn{min-width:220px;height:56px;padding:0 24px;border-radius:999px;border:1px solid rgba(120,74,84,.16);background:#fffdfa;color:#60414a;font-size:15px;font-weight:650;box-shadow:0 8px 18px rgba(82,46,56,.05);cursor:pointer}.subtle{margin-top:24px;color:var(--muted);font-size:15px;line-height:1.5;max-width:52ch}.srs-zone{margin-top:30px;padding:24px 24px 18px;border-radius:24px;background:linear-gradient(180deg,rgba(250,244,239,.96) 0%,rgba(255,252,248,.96) 100%);border:1px solid rgba(120,74,84,.12)}.srs-title{text-align:center;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:rgba(90,58,68,.52);margin-bottom:16px}.srs-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.srs-btn{min-height:104px;border-radius:24px;border:1px solid rgba(120,74,84,.14);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;box-shadow:0 14px 34px rgba(82,46,56,.06);background:var(--paper);cursor:pointer}.srs-btn strong{font-size:36px;line-height:1;letter-spacing:-.04em}.srs-btn span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.10em}.neg-hard{background:linear-gradient(180deg,#fff1f2 0%,#fffbfb 100%);color:#9a3d4d}.neg-soft{background:linear-gradient(180deg,#fff7f2 0%,#fffdfb 100%);color:#956149}.pos-soft{background:linear-gradient(180deg,#f5f1ed 0%,#fffdfa 100%);color:#65545a}.pos-hard{background:linear-gradient(180deg,#7b3440 0%,#642833 100%);color:#fff8f6;border-color:#6f2d38}.footer-note{margin-top:14px;text-align:center;color:rgba(90,58,68,.58);font-size:14px}.meta-row{margin-top:18px;display:flex;justify-content:space-between;align-items:center;gap:12px;color:var(--muted);font-size:14px}.meta-badges{display:flex;gap:8px;flex-wrap:wrap}.badge{padding:7px 10px;border-radius:999px;background:var(--soft-neutral);border:1px solid rgba(120,74,84,.10)}.status{font-weight:600}.hidden{opacity:0}@media (max-width:980px){.shell{width:min(100vw,calc(100vw - 20px));margin:10px auto;border-radius:20px}.page{padding:16px}.stage{min-height:auto;padding:16px}.labels,.columns{grid-template-columns:1fr;gap:14px}.panel{min-height:260px;padding:22px 20px}.phrase,.translation{font-size:clamp(28px,8vw,42px);max-width:none}.translation{min-height:96px}.srs-row{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class='shell'><header class='topbar'><div class='topbar-left'><button class='icon-btn' type='button' aria-label='Назад'><svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.1' stroke-linecap='round' stroke-linejoin='round'><path d='m15 18-6-6 6-6'/></svg></button><div class='brand-chip'>LLL2</div></div><div class='topbar-right'><button class='icon-btn' id='shuffleBtn' type='button' aria-label='Случайная фраза'><svg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M16 3h5v5'/><path d='M4 20 21 3'/><path d='M21 16v5h-5'/><path d='m15 15 6 6'/><path d='M4 4l5 5'/></svg></button></div></header><main class='page'><section class='stage'><div class='labels'><div class='label'>Latviešu</div><div class='label'>Перевод</div></div><div class='columns'><article class='panel'><div><div class='phrase' id='phraseLv'></div><div class='audio-wrap'><button class='audio-btn' id='audioBtn' type='button'><span class='audio-icon'>►</span><span>Прослушать</span></button></div></div><div><p class='subtle'>Случайный показ фраз. Кнопка +5 исключает фразу из ротации.</p><div class='meta-row'><div class='meta-badges' id='metaBadges'></div><div class='status' id='progressText'></div></div></div></article><article class='panel'><div><div class='translation hidden' id='phraseRu'></div><div class='translate-row'><button class='translate-btn' id='toggleTranslation' type='button'>Показать перевод</button></div></div><p class='subtle'>Внутри сборки 500 непустых строк.</p></article></div><section class='srs-zone'><div class='srs-title'>Насколько хорошо ты знаешь это выражение</div><div class='srs-row'><button class='srs-btn neg-hard' data-score='-5' type='button'><strong>-5</strong><span>Не знаю</span></button><button class='srs-btn neg-soft' data-score='-1' type='button'><strong>-1</strong><span>С трудом</span></button><button class='srs-btn pos-soft' data-score='1' type='button'><strong>+1</strong><span>Почти знаю</span></button><button class='srs-btn pos-hard' data-score='5' type='button'><strong>+5</strong><span>Выучил</span></button></div><div class='footer-note' id='footerNote'>Клик по любой кнопке сразу переключает на следующую случайную фразу, а +5 убирает её из ротации.</div></section></section></main></div><script src='./phrases-500.json.js'></script><script>let pool=PHRASES.filter(p=>!p.retired),current=null,translationVisible=false,audio=null;const $=id=>document.getElementById(id);function pick(arr,excludeId=null){if(!arr.length)return null;const a=excludeId==null?arr:arr.filter(x=>x.id!==excludeId);const s=a.length?a:arr;return s[Math.floor(Math.random()*s.length)]}function badge(t){const e=document.createElement('span');e.className='badge';e.textContent=t;return e}function renderMeta(item){const box=$('metaBadges');box.innerHTML='';if(item.verb_lemma)box.appendChild(badge('verb: '+item.verb_lemma));if(item.tense)box.appendChild(badge(item.tense));if(item.sentence_type)box.appendChild(badge(item.sentence_type));if(item.question)box.appendChild(badge('question'));if(item.negative)box.appendChild(badge('negative'));if(item.has_number)box.appendChild(badge('number'))}function updateProgress(){$('progressText').textContent=`В ротации: ${pool.length} / ${PHRASES.length}`}function hideTranslation(){translationVisible=false;$('phraseRu').classList.add('hidden');$('toggleTranslation').textContent='Показать перевод'}function showTranslation(){translationVisible=true;$('phraseRu').classList.remove('hidden');$('toggleTranslation').textContent='Скрыть перевод'}function render(item){if(!item)return;current=item;$('phraseLv').textContent=item.lv;$('phraseRu').textContent=item.ru;renderMeta(item);updateProgress();hideTranslation()}function nextRandom(){pool=PHRASES.filter(p=>!p.retired);const next=pick(pool,current?.id);if(!next){$('footerNote').textContent='Все фразы помечены как +5 и исключены из ротации.';return}$('footerNote').textContent='Клик по любой кнопке сразу переключает на следующую случайную фразу, а +5 убирает её из ротации.';render(next)}function speakCurrent(){if(!current)return;try{if(audio){audio.pause();audio=null}const url='https://translate.google.com/translate_tts?ie=UTF-8&q='+encodeURIComponent(current.lv)+'&tl=lv&client=tw-ob';audio=new Audio(url);audio.play().catch(()=>{})}catch(e){}}$('toggleTranslation').addEventListener('click',()=>{translationVisible?hideTranslation():showTranslation()});$('audioBtn').addEventListener('click',speakCurrent);$('shuffleBtn').addEventListener('click',nextRandom);document.querySelectorAll('.srs-btn').forEach(btn=>btn.addEventListener('click',()=>{if(!current)return;const score=Number(btn.dataset.score);if(score===5){const t=PHRASES.find(x=>x.id===current.id);if(t)t.retired=true}nextRandom()}));document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!translationVisible)showTranslation();if(e.key.toLowerCase()==='r')nextRandom();if(e.key===' '){e.preventDefault();speakCurrent()}});nextRandom();</script></body></html>
